<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Paciência SS Antifascista — Jogo de Paciência Educativo sobre Serviço Social</title>
  <meta name="description" content="Um jogo de paciência (solitaire) educativo sobre o Serviço Social Brasileiro e seus princípios éticos fundamentais. Jogue, aprenda e revise o Código de Ética de 1993." />
  <meta name="keywords" content="Serviço Social, Paciência, Código de Ética, CFESS, CRESS, Solitaire Educativo, Assistente Social" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✊</text></svg>">
  <link rel="stylesheet" href="src/styles/main.css" />
</head>
<body>
  <header>
    <h1>Paciência SS Antifascista</h1>
    <div id="controls">
      <span id="moves-counter" class="moves-counter" style="display: none;"></span>
      <button id="new-game-btn" type="button">Nova partida</button>
      <button id="review-mode-btn" type="button">Modo revisão</button>
      <button id="mute-btn" type="button" aria-pressed="false" aria-label="Desativar som">🔊</button>
    </div>
  </header>

  <main id="game-root" aria-label="Tabuleiro de paciência"></main>

  <div id="review-root" hidden></div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
