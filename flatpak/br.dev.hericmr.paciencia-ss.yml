app-id: br.dev.hericmr.paciencia-ss
runtime: org.gnome.Platform
runtime-version: "49"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: paciencia-ss

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri
  - --share=network

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/paciencia-ss/cargo

modules:
  - name: paciencia-ss
    buildsystem: simple
    build-commands:
      - mkdir -p dist
      - cp -r index.html src assets dist/
      - cargo --offline build --release --manifest-path src-tauri/Cargo.toml
      - install -Dm755 src-tauri/target/release/paciencia-ss /app/bin/paciencia-ss
      - install -Dm644 flatpak/br.dev.hericmr.paciencia-ss.desktop /app/share/applications/br.dev.hericmr.paciencia-ss.desktop
      - install -Dm644 flatpak/br.dev.hericmr.paciencia-ss.metainfo.xml /app/share/metainfo/br.dev.hericmr.paciencia-ss.metainfo.xml
      - install -Dm644 src-tauri/icons/16x16.png /app/share/icons/hicolor/16x16/apps/br.dev.hericmr.paciencia-ss.png
      - install -Dm644 src-tauri/icons/24x24.png /app/share/icons/hicolor/24x24/apps/br.dev.hericmr.paciencia-ss.png
      - install -Dm644 src-tauri/icons/32x32.png /app/share/icons/hicolor/32x32/apps/br.dev.hericmr.paciencia-ss.png
      - install -Dm644 src-tauri/icons/48x48.png /app/share/icons/hicolor/48x48/apps/br.dev.hericmr.paciencia-ss.png
      - install -Dm644 src-tauri/icons/64x64.png /app/share/icons/hicolor/64x64/apps/br.dev.hericmr.paciencia-ss.png
      - install -Dm644 src-tauri/icons/128x128.png /app/share/icons/hicolor/128x128/apps/br.dev.hericmr.paciencia-ss.png
      - install -Dm644 src-tauri/icons/256x256.png /app/share/icons/hicolor/256x256/apps/br.dev.hericmr.paciencia-ss.png
      - install -Dm644 src-tauri/icons/512x512.png /app/share/icons/hicolor/512x512/apps/br.dev.hericmr.paciencia-ss.png
    sources:
      # TODO: antes de submeter ao Flathub, troque por uma tag publicada:
      #   - type: git
      #     url: https://github.com/hericmr/paciencia.git
      #     tag: v0.1.0
      - type: git
        url: https://github.com/hericmr/paciencia.git
        branch: main
      - ../src-tauri/cargo-sources.json
