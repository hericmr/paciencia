name: Release desktop (Linux)

# Roda só quando uma tag de versão é empurrada (ex: v0.1.0) — não interfere
# no deploy do GitHub Pages, que é acionado por push na branch main.
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Instala dependências de sistema do Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl wget file libxdo-dev libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Instala Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Instala Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache do Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Instala dependências Node
        run: npm ci

      - name: Build e publica Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Serviço Social ${{ github.ref_name }}"
          releaseBody: "Build automático para Linux (.deb e .AppImage). Revise e publique manualmente."
          releaseDraft: true
          prerelease: false
